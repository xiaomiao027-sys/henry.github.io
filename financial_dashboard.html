<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金融分析仪表板 - Financial Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .dashboard-header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .dashboard-header h1 {
            color: #2c3e50;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-header p {
            color: #7f8c8d;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .stat-card h3 {
            color: #34495e;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .stat-card .change {
            font-size: 0.9em;
            font-weight: 500;
        }

        .positive {
            color: #27ae60;
        }

        .negative {
            color: #e74c3c;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
            margin-bottom: 25px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .chart-card h3 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .full-width-chart {
            grid-column: 1 / -1;
        }

        .full-width-chart .chart-container {
            height: 400px;
        }

        .update-info {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9em;
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.95);
            color: #2c3e50;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .nav-btn:hover {
            background: #2c3e50;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .nav-btn.active {
            background: #2c3e50;
            color: white;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .dashboard-header h1 {
                font-size: 2em;
            }
            
            .nav-buttons {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>📊 金融分析仪表板</h1>
            <p>实时金融数据分析与可视化 | Financial Analytics Dashboard</p>
        </div>

        <div class="nav-buttons">
            <a href="financial/index.html" class="nav-btn">📈 金融作品集</a>
            <a href="dashboard.html" class="nav-btn">🛒 电商仪表板</a>
            <a href="main.html" class="nav-btn">🏠 主页</a>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>投资组合总值</h3>
                <div class="value" id="portfolio-value">¥2,456,789</div>
                <div class="change positive">+5.23% ↗</div>
            </div>
            <div class="stat-card">
                <h3>今日收益率</h3>
                <div class="value" id="daily-return">+2.34%</div>
                <div class="change positive">+¥12,345 ↗</div>
            </div>
            <div class="stat-card">
                <h3>股票数量</h3>
                <div class="value" id="stock-count">156</div>
                <div class="change positive">+12 新增 ↗</div>
            </div>
            <div class="stat-card">
                <h3>风险评级</h3>
                <div class="value" id="risk-level">中等</div>
                <div class="change">稳定 ↗</div>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>📈 投资组合表现</h3>
                <div class="chart-container">
                    <canvas id="portfolioChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>🥧 资产配置分布</h3>
                <div class="chart-container">
                    <canvas id="allocationChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>📊 行业分析</h3>
                <div class="chart-container">
                    <canvas id="sectorChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>🔥 风险收益散点图</h3>
                <div class="chart-container">
                    <canvas id="riskReturnChart"></canvas>
                </div>
            </div>
            <div class="chart-card full-width-chart">
                <h3>📅 市场趋势分析</h3>
                <div class="chart-container">
                    <canvas id="marketTrendChart"></canvas>
                </div>
            </div>
        </div>

        <div class="update-info">
            <p>🔄 最后更新: <span id="last-update"></span> | 数据每5分钟自动更新</p>
        </div>
    </div>

    <script>
        // 生成金融数据
        function generateFinancialData() {
            const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
            
            // 投资组合数据
            const portfolioData = months.map(() => Math.floor(Math.random() * 500000) + 2000000);
            
            // 资产配置数据
            const allocationData = {
                labels: ['股票', '债券', '基金', '现金', '其他'],
                data: [35, 25, 20, 15, 5]
            };
            
            // 行业数据
            const sectorData = {
                labels: ['科技', '金融', '医疗', '消费', '能源', '工业'],
                returns: [12.5, 8.3, 15.2, 6.7, 9.8, 7.4],
                risks: [18.2, 12.1, 22.3, 8.9, 14.5, 11.2]
            };
            
            // 市场趋势数据
            const marketData = {
                labels: months,
                datasets: [
                    {
                        label: '上证指数',
                        data: months.map(() => Math.floor(Math.random() * 1000) + 3000),
                        borderColor: 'rgb(255, 99, 132)',
                        backgroundColor: 'rgba(255, 99, 132, 0.1)',
                        tension: 0.4
                    },
                    {
                        label: '深证成指',
                        data: months.map(() => Math.floor(Math.random() * 1500) + 10000),
                        borderColor: 'rgb(54, 162, 235)',
                        backgroundColor: 'rgba(54, 162, 235, 0.1)',
                        tension: 0.4
                    },
                    {
                        label: '创业板指',
                        data: months.map(() => Math.floor(Math.random() * 800) + 2000),
                        borderColor: 'rgb(75, 192, 192)',
                        backgroundColor: 'rgba(75, 192, 192, 0.1)',
                        tension: 0.4
                    }
                ]
            };
            
            return {
                months,
                portfolioData,
                allocationData,
                sectorData,
                marketData
            };
        }

        // 初始化图表
        function initCharts() {
            const data = generateFinancialData();
            
            // 投资组合表现图表
            const portfolioCtx = document.getElementById('portfolioChart').getContext('2d');
            new Chart(portfolioCtx, {
                type: 'line',
                data: {
                    labels: data.months,
                    datasets: [{
                        label: '投资组合价值',
                        data: data.portfolioData,
                        borderColor: 'rgb(75, 192, 192)',
                        backgroundColor: 'rgba(75, 192, 192, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            ticks: {
                                callback: function(value) {
                                    return '¥' + value.toLocaleString();
                                }
                            }
                        }
                    }
                }
            });
            
            // 资产配置图表
            const allocationCtx = document.getElementById('allocationChart').getContext('2d');
            new Chart(allocationCtx, {
                type: 'doughnut',
                data: {
                    labels: data.allocationData.labels,
                    datasets: [{
                        data: data.allocationData.data,
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.8)',
                            'rgba(54, 162, 235, 0.8)',
                            'rgba(255, 206, 86, 0.8)',
                            'rgba(75, 192, 192, 0.8)',
                            'rgba(153, 102, 255, 0.8)'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
            
            // 行业分析图表
            const sectorCtx = document.getElementById('sectorChart').getContext('2d');
            new Chart(sectorCtx, {
                type: 'bar',
                data: {
                    labels: data.sectorData.labels,
                    datasets: [
                        {
                            label: '收益率 (%)',
                            data: data.sectorData.returns,
                            backgroundColor: 'rgba(75, 192, 192, 0.8)'
                        },
                        {
                            label: '风险 (%)',
                            data: data.sectorData.risks,
                            backgroundColor: 'rgba(255, 99, 132, 0.8)'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
            
            // 风险收益散点图
            const riskReturnCtx = document.getElementById('riskReturnChart').getContext('2d');
            const scatterData = data.sectorData.labels.map((label, i) => ({
                x: data.sectorData.risks[i],
                y: data.sectorData.returns[i],
                label: label
            }));
            
            new Chart(riskReturnCtx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: '行业风险收益',
                        data: scatterData,
                        backgroundColor: 'rgba(54, 162, 235, 0.8)',
                        pointRadius: 8,
                        pointHoverRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: '风险 (%)'
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: '收益率 (%)'
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.raw.label + ': 风险 ' + context.parsed.x + '%, 收益 ' + context.parsed.y + '%';
                                }
                            }
                        }
                    }
                }
            });
            
            // 市场趋势图表
            const marketTrendCtx = document.getElementById('marketTrendChart').getContext('2d');
            new Chart(marketTrendCtx, {
                type: 'line',
                data: data.marketData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        y: {
                            beginAtZero: false
                        }
                    }
                }
            });
        }

        // 更新统计数据
        function updateStats() {
            const portfolioValue = document.getElementById('portfolio-value');
            const dailyReturn = document.getElementById('daily-return');
            const stockCount = document.getElementById('stock-count');
            const riskLevel = document.getElementById('risk-level');
            
            // 模拟数据变化
            const currentValue = parseInt(portfolioValue.textContent.replace(/[¥,]/g, ''));
            const newValue = currentValue + Math.floor(Math.random() * 10000) - 5000;
            portfolioValue.textContent = '¥' + newValue.toLocaleString();
            
            const returnChange = (Math.random() * 4 - 1).toFixed(2);
            dailyReturn.textContent = (returnChange > 0 ? '+' : '') + returnChange + '%';
            dailyReturn.className = returnChange > 0 ? 'change positive' : 'change negative';
            
            const newStockCount = parseInt(stockCount.textContent) + Math.floor(Math.random() * 5) - 2;
            stockCount.textContent = newStockCount;
        }

        // 更新时间
        function updateTime() {
            const now = new Date();
            document.getElementById('last-update').textContent = now.toLocaleString('zh-CN');
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            updateTime();
            
            // 每5秒更新一次统计数据
            setInterval(updateStats, 5000);
            
            // 每分钟更新一次时间
            setInterval(updateTime, 60000);
        });
    </script>
</body>
</html>
